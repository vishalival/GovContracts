name: Devin Doc Drift Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: devin-doc-drift-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  pr-doc-drift-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR changed files
        id: pr-files
        run: |
          FILES=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" | \
            jq -r '[.[].filename] | @json')

          if [ -z "$FILES" ] || [ "$FILES" = "null" ]; then
            echo "Error: failed to fetch PR files."
            exit 1
          fi

          echo "files=$FILES" >> "$GITHUB_OUTPUT"

          # Files likely relevant to API/docs drift.
          RELEVANT_FILES=$(echo "$FILES" | jq -c '[.[] | select(
            test("(^docs/)|(^backend/)|(^frontend/lib/api\\.)|(^frontend/app/api/)|(^openapi\\.)|(^swagger\\.)|(^api/)")
          )]')

          echo "relevant_files=$RELEVANT_FILES" >> "$GITHUB_OUTPUT"

          RELEVANT_COUNT=$(echo "$RELEVANT_FILES" | jq 'length')
          echo "relevant_count=$RELEVANT_COUNT" >> "$GITHUB_OUTPUT"

      - name: Skip if no likely API/docs files changed
        if: ${{ steps.pr-files.outputs.relevant_count == '0' }}
        run: |
          echo "No likely API/docs files changed; skipping Devin doc-drift review."

      - name: Create Devin session for doc-drift review/remediation
        if: ${{ steps.pr-files.outputs.relevant_count != '0' }}
        id: devin-review
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          REVIEW_PROMPT: |
            You are Devin acting as an API documentation drift reviewer and fixer for this PR.

            Assignment context:
            "Our API docs are out of date because endpoint changes are not reflected in docs.
            Detect drift and keep practical API references current without overwhelming engineers."

            Repository:
            - Repo: ${{ github.repository }}
            - PR number: ${{ github.event.pull_request.number }}
            - Changed files (all): ${{ steps.pr-files.outputs.files }}
            - Changed files (API/docs-relevant): ${{ steps.pr-files.outputs.relevant_files }}

            Goals:
            1) Detect drift between API behavior/usages and docs.
            2) Fix straightforward reference-doc drift directly in this PR branch when safe.
            3) Keep review noise low with one consolidated summary comment.
            4) Explicitly request human judgment before documenting ambiguous policy inputs or new decision fields.

            What counts as drift:
            - Endpoint path/method changed but docs not updated
            - Query/path/body/header params changed but docs outdated
            - Response shape/fields/types/examples changed but docs outdated
            - Validation/status/error behavior changed but docs outdated
            - Frontend API usage expects behavior not documented

            Process:
            1) Inspect PR diff first.
            2) Compare API sources and usage to docs (prioritize docs/api.md).
            3) Separate:
               - Auto-generated/reference docs (OpenAPI, Swagger, endpoint tables, params, response fields, error/status codes): safe to auto-fix.
               - Conceptual docs (guides, architecture, tutorials, onboarding): do not rewrite; suggest concise outline only for human review.
            4) If no drift, post exactly:
               "No documentation drift detected for this PR."
            5) If drift exists:
               - Apply minimal edits to docs for clear reference drift (prefer docs/api.md).
               - Keep edits scoped to changed endpoints only.
               - Post one consolidated PR comment containing:
                 a) drift summary table (endpoint, drift type, severity, evidence)
                 b) files auto-updated
                 c) conceptual-doc follow-up items (if any)
                 d) brief reviewer checklist.
               - If any endpoint requires policy interpretation or manual decision inputs, include a "Human Judgment Needed" section with explicit questions and wait for maintainer guidance before finalizing those doc details.

            Guardrails:
            - You MAY edit files and commit/push to this PR branch for doc fixes.
            - Do NOT perform large refactors or unrelated changes.
            - Do NOT open new PRs.
            - Keep to one summary comment unless blocked by tooling.
        run: |
          if [ -z "$DEVIN_API_KEY" ]; then
            echo "Error: DEVIN_API_KEY is not set."
            exit 1
          fi

          if [ -n "$DEVIN_PLAYBOOK_ID" ]; then
            PAYLOAD=$(jq -n \
              --arg pb "$DEVIN_PLAYBOOK_ID" \
              --arg prompt "$REVIEW_PROMPT" \
              '{playbook_id: $pb, prompt: $prompt, idempotent: true}')
          else
            PAYLOAD=$(jq -n \
              --arg prompt "$REVIEW_PROMPT" \
              '{prompt: $prompt, idempotent: true}')
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.devin.ai/v1/sessions")

          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.detail // empty')
          if [ -n "$ERROR_MSG" ]; then
            echo "Error creating Devin session: $ERROR_MSG"
            exit 1
          fi

          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id // empty')
          SESSION_URL=$(echo "$RESPONSE" | jq -r '.url // empty')

          if [ -z "$SESSION_ID" ] || [ -z "$SESSION_URL" ]; then
            echo "Error: missing session details in Devin response."
            echo "$RESPONSE"
            exit 1
          fi

          echo "session-id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "session-url=$SESSION_URL" >> "$GITHUB_OUTPUT"

      - name: Add session link to workflow summary
        if: ${{ steps.devin-review.outputs.session-url != '' }}
        run: |
          {
            echo "## Devin PR Doc Drift Session"
            echo ""
            echo "- Session ID: \`${{ steps.devin-review.outputs.session-id }}\`"
            echo "- URL: ${{ steps.devin-review.outputs.session-url }}"
            echo "- Relevant files in PR: ${{ steps.pr-files.outputs.relevant_count }}"
          } >> "$GITHUB_STEP_SUMMARY"

  scheduled-doc-drift-scan:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Devin session for full-repo drift scan
        id: devin-scan
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          REVIEW_PROMPT: |
            You are Devin performing a scheduled full-repository API-doc drift scan.

            Assignment context:
            API docs can drift behind implementation; detect drift proactively and keep engineering noise low.

            Repository:
            - Repo: ${{ github.repository }}
            - Trigger: ${{ github.event_name }}
            - Branch: ${{ github.ref_name }}

            Goals:
            1) Scan API implementation/usages and docs for drift.
            2) Auto-fix only clear reference-doc drift.
            3) Avoid unnecessary churn.
            4) Flag policy-sensitive or judgment-dependent inputs and request human confirmation before finalizing those details.

            Scope guidance:
            - Reference docs (safe to update): endpoint/method tables, params, response fields, status/error codes, OpenAPI/Swagger references.
            - Conceptual docs (human ownership): architecture guidance, narratives, migration strategy. For these, provide concise proposed outline only.

            Output policy:
            - Create one concise summary comment/report of drift findings and updates.
            - Group related drift items; avoid spammy comments.

            Guardrails:
            - You MAY edit docs and push focused fixes.
            - Do NOT make unrelated code refactors.
            - Do NOT open new PRs.
        run: |
          if [ -z "$DEVIN_API_KEY" ]; then
            echo "Error: DEVIN_API_KEY is not set."
            exit 1
          fi

          if [ -n "$DEVIN_PLAYBOOK_ID" ]; then
            PAYLOAD=$(jq -n \
              --arg pb "$DEVIN_PLAYBOOK_ID" \
              --arg prompt "$REVIEW_PROMPT" \
              '{playbook_id: $pb, prompt: $prompt, idempotent: true}')
          else
            PAYLOAD=$(jq -n \
              --arg prompt "$REVIEW_PROMPT" \
              '{prompt: $prompt, idempotent: true}')
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.devin.ai/v1/sessions")

          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.detail // empty')
          if [ -n "$ERROR_MSG" ]; then
            echo "Error creating Devin session: $ERROR_MSG"
            exit 1
          fi

          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id // empty')
          SESSION_URL=$(echo "$RESPONSE" | jq -r '.url // empty')

          if [ -z "$SESSION_ID" ] || [ -z "$SESSION_URL" ]; then
            echo "Error: missing session details in Devin response."
            echo "$RESPONSE"
            exit 1
          fi

          echo "session-id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "session-url=$SESSION_URL" >> "$GITHUB_OUTPUT"

      - name: Add scheduled session link to workflow summary
        if: ${{ steps.devin-scan.outputs.session-url != '' }}
        run: |
          {
            echo "## Devin Scheduled Doc Drift Session"
            echo ""
            echo "- Session ID: \`${{ steps.devin-scan.outputs.session-id }}\`"
            echo "- URL: ${{ steps.devin-scan.outputs.session-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
