name: Devin COBOL Modernization

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      contract_id:
        description: "Contract ID to modernize (example: DOT-2026-00041)"
        required: false
        default: "N/A"
        type: string
      cobol_path:
        description: "Path to COBOL source file"
        required: false
        default: "backend/legacy_cobol/CONTRACT_AWARD_ADJUDICATION.cbl"
        type: string
      target_stack:
        description: "Modernization target stack"
        required: false
        default: "python-fastapi"
        type: string
      base_branch:
        description: "Base branch for changes"
        required: false
        default: "main"
        type: string
  repository_dispatch:
    types:
      - devin-cobol-modernize

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: devin-cobol-modernization-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  launch-devin-modernization:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve trigger context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CONTRACT_ID: ${{ github.event.inputs.contract_id || github.event.client_payload.contract_id || '' }}
          COBOL_PATH: ${{ github.event.inputs.cobol_path || github.event.client_payload.cobol_path || 'backend/legacy_cobol/CONTRACT_AWARD_ADJUDICATION.cbl' }}
          TARGET_STACK: ${{ github.event.inputs.target_stack || github.event.client_payload.target_stack || 'python-fastapi' }}
          BASE_BRANCH: ${{ github.event.inputs.base_branch || github.event.client_payload.base_branch || 'main' }}
          DECISION_PREVIEW: ${{ github.event.client_payload.decision_preview || '' }}
          VENDOR_ID: ${{ github.event.client_payload.vendor_id || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LEGACY_FILES="[]"
          LEGACY_COUNT="0"
          SHOULD_RUN="true"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            FILES=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$REPOSITORY/pulls/$PR_NUMBER/files" | \
              jq -r '[.[].filename] | @json')

            if [ -z "$FILES" ] || [ "$FILES" = "null" ]; then
              echo "Error: failed to fetch PR files."
              exit 1
            fi

            LEGACY_FILES=$(echo "$FILES" | jq -c '[.[] | select(
              test("(^backend/legacy_cobol/)|(.+\\.(cbl|cob|cpy)$)"; "i")
            )]')
            LEGACY_COUNT=$(echo "$LEGACY_FILES" | jq 'length')

            if [ "$LEGACY_COUNT" = "0" ]; then
              SHOULD_RUN="false"
            fi

            BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            if [ -z "$CONTRACT_ID" ]; then
              CONTRACT_ID="N/A"
            fi
            if [ -z "$COBOL_PATH" ] || [ "$COBOL_PATH" = "backend/legacy_cobol/CONTRACT_AWARD_ADJUDICATION.cbl" ]; then
              COBOL_PATH=$(echo "$LEGACY_FILES" | jq -r '.[0] // "backend/legacy_cobol/CONTRACT_AWARD_ADJUDICATION.cbl"')
            fi
          fi

          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "cobol_path=$COBOL_PATH" >> "$GITHUB_OUTPUT"
          echo "target_stack=$TARGET_STACK" >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "decision_preview=$DECISION_PREVIEW" >> "$GITHUB_OUTPUT"
          echo "vendor_id=$VENDOR_ID" >> "$GITHUB_OUTPUT"
          echo "legacy_files=$LEGACY_FILES" >> "$GITHUB_OUTPUT"
          echo "legacy_count=$LEGACY_COUNT" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Skip when PR has no legacy COBOL changes
        if: ${{ github.event_name == 'pull_request' && steps.context.outputs.should_run == 'false' }}
        run: |
          echo "No changed COBOL/legacy files detected in this PR; skipping Devin modernization session."

      - name: Create Devin modernization session
        if: ${{ github.event_name != 'pull_request' || steps.context.outputs.should_run == 'true' }}
        id: devin-modernize
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          MODERNIZATION_PROMPT: |
            You are Devin modernizing legacy COBOL adjudication logic with strict behavior parity.
            Default modernization target is python-fastapi unless explicitly overridden in workflow input/payload.
            Start implementation immediately; no clarification step is needed for target stack.

            **Read and follow the COBOL Modernization Playbook at `docs/COBOL_MODERNIZATION_PLAYBOOK.md`
            in this repository.** It contains all naming conventions, architecture standards,
            testing requirements, parity verification rules, and documentation templates.

            Repository context:
            - Repo: ${{ github.repository }}
            - Trigger: ${{ github.event_name }}
            - Base branch: ${{ steps.context.outputs.base_branch }}
            - Contract ID: ${{ steps.context.outputs.contract_id }}
            - Vendor ID: ${{ steps.context.outputs.vendor_id }}
            - COBOL source path: ${{ steps.context.outputs.cobol_path }}
            - Target stack: ${{ steps.context.outputs.target_stack }}
            - Legacy decision preview: ${{ steps.context.outputs.decision_preview }}
            - PR number: ${{ github.event.pull_request.number || 'N/A' }}
            - Changed legacy files: ${{ steps.context.outputs.legacy_files }}

            Goals (see playbook for full details):
            1) Complete the COBOL Analysis Checklist (playbook §3) — identify paragraphs,
               data items, decision logic, thresholds, and copybook dependencies.
            2) Produce a decision matrix table mapping every COBOL branch to its output.
            3) Generate equivalent modernized implementation in python-fastapi (or provided
               target stack override) following the Implementation Standards (playbook §4):
               - Extract thresholds as named constants (§4.2)
               - Use early-return to match COBOL GO TO semantics (§4.5)
               - Use int for monetary values, never float (§4.7)
            4) Preserve behavioral parity for APPROVE | REVIEW | REJECT outputs.
               Document any deviations in a parity_notes.md file (playbook §6.3).
            5) Add or update unit tests per the Testing Standards (playbook §5):
               - Happy path, each REJECT branch, each REVIEW branch
               - Boundary values at threshold ± 1
               - Edge cases and combination tests
            6) Run the unit tests and include pass/fail status in your PR summary/comment.
            7) Produce the mapping document (COBOL paragraph → Python function) per §7.

            Guardrails (see playbook §8 for full list):
            - You MAY edit files and push focused changes.
            - Keep changes scoped to modernization and parity tests/docs only.
            - Preserve the original .cbl file unchanged — it is the source-of-truth reference.
            - Do NOT perform broad refactors.
            - Do NOT open new PRs; update the branch in place.
            - Do NOT modify API response schemas without versioning.
            - Do NOT use floating-point for monetary calculations.
            - Report assumptions and any parity risks clearly.
        run: |
          if [ -z "$DEVIN_API_KEY" ]; then
            echo "Error: DEVIN_API_KEY is not set."
            exit 1
          fi

          if [ -n "$DEVIN_PLAYBOOK_ID" ]; then
            PAYLOAD=$(jq -n \
              --arg pb "$DEVIN_PLAYBOOK_ID" \
              --arg prompt "$MODERNIZATION_PROMPT" \
              '{playbook_id: $pb, prompt: $prompt, idempotent: true}')
          else
            PAYLOAD=$(jq -n \
              --arg prompt "$MODERNIZATION_PROMPT" \
              '{prompt: $prompt, idempotent: true}')
          fi

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.devin.ai/v1/sessions")

          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.detail // empty')
          if [ -n "$ERROR_MSG" ]; then
            echo "Error creating Devin session: $ERROR_MSG"
            exit 1
          fi

          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id // empty')
          SESSION_URL=$(echo "$RESPONSE" | jq -r '.url // empty')

          if [ -z "$SESSION_ID" ] || [ -z "$SESSION_URL" ]; then
            echo "Error: missing session details in Devin response."
            echo "$RESPONSE"
            exit 1
          fi

          echo "session-id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "session-url=$SESSION_URL" >> "$GITHUB_OUTPUT"

      - name: Add session link to workflow summary
        if: ${{ steps.devin-modernize.outputs.session-url != '' }}
        run: |
          {
            echo "## Devin COBOL Modernization Session"
            echo ""
            echo "- Session ID: \`${{ steps.devin-modernize.outputs.session-id }}\`"
            echo "- URL: ${{ steps.devin-modernize.outputs.session-url }}"
            echo "- Contract ID: ${{ steps.context.outputs.contract_id }}"
            echo "- COBOL path: ${{ steps.context.outputs.cobol_path }}"
            echo "- Target stack: ${{ steps.context.outputs.target_stack }}"
            echo "- Legacy files in PR: ${{ steps.context.outputs.legacy_count }}"
          } >> "$GITHUB_STEP_SUMMARY"
